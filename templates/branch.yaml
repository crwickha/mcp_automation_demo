      subnets:
        - local_subnet: "10.{site_high}.{site_low}.0/24"
          use_vpn: true
        - local_subnet: "192.168.100.0/24"
          use_vpn: false
        - local_subnet: "10.{site_high}.{site_low_voip}.0/24"
          use_vpn: true

  # ──────────────────────────────────────────────
  # LARGE branch — adds IoT VLAN
