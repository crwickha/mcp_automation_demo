# Branch Network Templates
# Each tier defines the VLANs, SSIDs, firewall rules, and VPN config
# for that size of branch office.
#
# Variables (auto-computed from network name like "114 - Langley"):
#   {name}           - Full network name
#   {location}       - Location portion (e.g. "Langley")
#   {site_number}    - Numeric site ID (e.g. 114)
#   {site_high}      - High octet: site_number // 256  (e.g. 0 for site 114, 1 for site 257)
#   {site_low}       - Low octet:  site_number % 256   (e.g. 114 for site 114, 1 for site 257)
#   {site_low_voip}  - Low octet + 1 (unique subnet for VoIP)
#   {site_low_iot}   - Low octet + 2 (unique subnet for IoT)
#
# Addressing scheme:
#   Corp   → 10.{site_high}.{site_low}.0/24      (unique per site, routed over VPN)
#   Guest  → 192.168.100.0/24                     (same everywhere, local only)
#   VoIP   → 10.{site_high}.{site_low_voip}.0/24  (unique per site, routed over VPN)
#   IoT    → 10.{site_high}.{site_low_iot}.0/24   (unique per site, routed over VPN)

product_types:
  - appliance
  - switch
  - wireless

# ──────────────────────────────────────────────
# SMALL branch — 2 VLANs, 2 SSIDs
# ──────────────────────────────────────────────
tiers:
  small:
    description: "Small branch — Corp + Guest"
    vlans:
      - id: 10
        name: Corp
        subnet: "10.{site_high}.{site_low}.0/24"
        appliance_ip: "10.{site_high}.{site_low}.1"
        dhcp_handling: "Run a DHCP server"
        dns_nameservers: "upstream_dns"
      - id: 20
        name: Guest
        subnet: "192.168.100.0/24"
        appliance_ip: "192.168.100.1"
        dhcp_handling: "Run a DHCP server"
        dns_nameservers: "upstream_dns"

    ssids:
      - number: 0
        name: "Corp-{location}"
        enabled: true
        auth_mode: psk
        encryption_mode: wpa
        psk: "CorpWifi2024!"
        ip_assignment_mode: "Bridge mode"
        default_vlan_id: 10
      - number: 1
        name: "Guest-{location}"
        enabled: true
        auth_mode: psk
        encryption_mode: wpa
        psk: "GuestWifi2024!"
        ip_assignment_mode: "Bridge mode"
        default_vlan_id: 20

    firewall_rules:
      - comment: "Block guest to corp"
        policy: deny
        protocol: any
        src_cidr: "192.168.100.0/24"
        dest_cidr: "10.{site_high}.{site_low}.0/24"
        dest_port: any
        syslog_enabled: false

    vpn:
      mode: spoke
      hubs:
        - hub_id: "L_660903245316622322"
          name: "Home"
          use_default_route: false
      subnets:
        - local_subnet: "10.{site_high}.{site_low}.0/24"
          use_vpn: true
        - local_subnet: "192.168.100.0/24"
          use_vpn: false

  # ──────────────────────────────────────────────
  # MEDIUM branch — adds VoIP VLAN + SSID
  # ──────────────────────────────────────────────
  medium:
