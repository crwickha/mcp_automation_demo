        src_cidr: "192.168.100.0/24"
        dest_cidr: "10.{site_high}.{site_low}.0/24"
        dest_port: any
        syslog_enabled: false
      - comment: "Block guest to VoIP"
        policy: deny
        protocol: any
        src_cidr: "192.168.100.0/24"
        dest_cidr: "10.{site_high}.{site_low_voip}.0/24"
        dest_port: any
        syslog_enabled: false
      - comment: "Allow VoIP to corp (SIP/RTP)"
