product_types:
- appliance
- switch
- wireless
tiers:
  small:
    description: "Small branch \u2014 Corp + Guest"
    vlans:
    - id: 10
      name: Corp
      subnet: 10.{site_high}.{site_low}.0/24
      appliance_ip: 10.{site_high}.{site_low}.1
      dhcp_handling: Run a DHCP server
      dns_nameservers: upstream_dns
    - id: 20
      name: Guest
      subnet: 192.168.100.0/24
      appliance_ip: 192.168.100.1
      dhcp_handling: Run a DHCP server
      dns_nameservers: upstream_dns
    ssids:
    - number: 0
      name: Corp
      enabled: true
      auth_mode: psk
      encryption_mode: wpa
      psk: CorpWifi2024!
      ip_assignment_mode: Bridge mode
      default_vlan_id: 10
    - number: 1
      name: Guest
      enabled: true
      auth_mode: psk
      encryption_mode: wpa
      psk: GuestWifi2024!
      ip_assignment_mode: Bridge mode
      default_vlan_id: 20
    firewall_rules:
    - comment: Block guest to corp
      policy: deny
      protocol: any
      src_cidr: 192.168.100.0/24
      dest_cidr: 10.{site_high}.{site_low}.0/24
      dest_port: any
      syslog_enabled: false
    vpn:
      mode: spoke
      hubs:
      - hub_id: L_660903245316622322
        name: Home
        use_default_route: false
      subnets:
      - local_subnet: 10.{site_high}.{site_low}.0/24
        use_vpn: true
      - local_subnet: 192.168.100.0/24
        use_vpn: false
  medium:
